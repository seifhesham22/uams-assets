<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Monitor body (screen + bezel from directly above) -->
  <!-- Outer bezel -->
  <rect x="10" y="10" width="100" height="45" rx="3" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Screen panel -->
  <rect x="14" y="14" width="92" height="37" rx="1" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  
  <!-- Screen subtle inner shadow line -->
  <rect x="15" y="15" width="90" height="35" rx="1" fill="#f3f4f6"/>
  
  <!-- Glare line for glass effect -->
  <line x1="16" y1="18" x2="40" y2="18" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Stand neck (centered behind screen, bottom edge) -->
  <rect x="46" y="55" width="28" height="8" fill="#6b7280" stroke="#4b5563" stroke-width="1"/>

  <!-- Stand base (wider flat base) -->
  <rect x="34" y="63" width="52" height="7" rx="2" fill="#9ca3af" stroke="#6b7280" stroke-width="1"/>
  
  <!-- Base subtle detail line -->
  <line x1="38" y1="66" x2="82" y2="66" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
</svg>
